name: Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 获取官方安装器
        run: |
          set -eux
          mkdir -p public/windows public/yanbao/windows
          curl --fail --location --silent --show-error \
            https://raw.githubusercontent.com/YanXuLang/yanxu/main/scripts/install.sh \
            --output public/index.html
          curl --fail --location --silent --show-error \
            https://raw.githubusercontent.com/YanXuLang/yanxu/main/scripts/install.ps1 \
            --output public/windows/index.html
          curl --fail --location --silent --show-error \
            https://raw.githubusercontent.com/YanXuLang/yanbao/main/scripts/install.sh \
            --output public/yanbao/index.html
          curl --fail --location --silent --show-error \
            https://raw.githubusercontent.com/YanXuLang/yanbao/main/scripts/install.ps1 \
            --output public/yanbao/windows/index.html
          touch public/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: 发布安装入口
        id: deployment
        uses: actions/deploy-pages@v4
